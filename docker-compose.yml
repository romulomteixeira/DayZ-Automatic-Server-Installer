services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dayz-manager-backend
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./manager:/app/manager
      - ./data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: dayz-manager-web
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
